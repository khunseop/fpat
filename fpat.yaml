# FPAT 통합 설정 파일 (YAML)

# 1. 파일 관리 및 명명 규칙
file_management:
  policy_version_format: "_v{version}"
  final_version_suffix: "_vf"
  request_id_prefix: "request_id_"
  default_extension: ".xlsx"

# 2. 분석 기준 설정
analysis_criteria:
  recent_policy_days: 90 # 신규 정책으로 간주할 기간
  unused_threshold_days: 90 # 미사용 정책 판단 기준일

# 3. 삭제 프로세스 예외 설정 (핵심)
exceptions:
  request_ids:
    - id: "PS-2024-0001"
      reason: "차세대 프로젝트 핵심 정책"
      until: "2025-12-31"
  
  policy_rules:
    - pattern: "^MGMT_.*"
      reason: "관리 도구용 정책"
    - pattern: ".*_BKP$"
      reason: "백업 세션용"

  static_list:
    - "VPN_ACCESS"
    - "MONITORING"

# 4. 정책 가공 및 분석 상세 설정 (고도화)
policy_processing:
  # 신청 정보 파싱을 위한 정규식 패턴 (RequestParser)
  # YAML에서는 백슬래시(\) 처리를 위해 작은따옴표('') 사용을 권장합니다.
  request_parsing:
    # 예시: r'\d{8}-(\d{1,7})-\d{1,2}' 패턴을 각 서비스에 맞게 구성
    gsams_3_pattern: '(\d{8})-(\d{1,7})-(\d{1,2})' # 예시용 (실제 그룹 순서에 맞춰 조정 필요)
    gsams_1_rulename_pattern: '^(\d{8}-\d{1,7}-\d{1,2})' 
    gsams_1_user_pattern: '\[([^\]]+)\]'
    gsams_1_desc_pattern: '신청번호: (\d{8}-\d{1,7}-\d{1,2})'
    gsams_1_date_pattern: '(\d{8})~(\d{8})'

  # 예외 및 인프라 정책 식별 마커 (ExceptionHandler)
  analysis_markers:
    paloalto:
      deny_standard_rule_name: "Deny_All"
      infrastructure_prefixes: ["X", "X-", "SYS_"]
      infrastructure_exception_label: "인프라정책"
      special_policy_label: "특수정책"
    secui:
      deny_standard_description_keyword: "차단기준"
      infrastructure_exception_label: "인프라정책"

  # 데이터 취합 및 이메일 도메인 설정 (ApplicationAggregator)
  aggregation:
    column_mapping:
      "신청번호": "REQUEST_ID"
      "시작일": "REQUEST_START_DATE"
      "종료일": "REQUEST_END_DATE"
    final_columns: 
      - "REQUEST_ID"
      - "REQUEST_START_DATE"
      - "REQUEST_END_DATE"
      - "REQUESTER_ID"
    email_domain_map:
      "oldcorp.com": "company.com"
    title_bracket_pattern: '^\[([^\[\]]{1,8})\]'

# 5. 공지 대상 분류 설정 (NotificationClassifier)
columns:
  all:
    - "Rule Name"
    - "Source"
    - "User"
    - "Destination"
    - "Service"
    - "Application"
    - "Description"
    - "REQUEST_ID"
    - "REQUEST_START_DATE"
    - "REQUEST_END_DATE"
    - "TITLE"
    - "REQUESTER_ID"
    - "REQUESTER_EMAIL"
    - "REQUESTER_NAME"
    - "REQUESTER_DEPT"
    - "WRITE_PERSON_ID"
    - "WRITE_PERSON_EMAIL"
    - "WRITE_PERSON_NAME"
    - "WRITE_PERSON_DEPT"
    - "APPROVAL_PERSON_ID"
    - "APPROVAL_PERSON_EMAIL"
    - "APPROVAL_PERSON_NAME"
    - "APPROVAL_PERSON_DPET_NAME"
  no_history:
    - "Rule Name"
    - "Source"
    - "User"
    - "Destination"
    - "Service"
    - "Application"
    - "Description"
  date_columns:
    - "REQUEST_START_DATE"
    - "REQUEST_END_DATE"

translated_columns:
  "Rule Name": "정책명"
  "Source": "출발지"
  "User": "사용자"
  "Destination": "목적지"
  "Service": "서비스"
  "Application": "애플리케이션"
  "Description": "설명"
  "REQUEST_ID": "GSAMS 신청번호"
  "REQUEST_START_DATE": "시작일"
  "REQUEST_END_DATE": "종료일"
  "TITLE": "제목"
  "REQUESTER_ID": "신청자 ID"
  "REQUESTER_EMAIL": "신청자 이메일"
  "REQUESTER_NAME": "신청자명"
  "REQUESTER_DEPT": "신청자 부서"
  "WRITE_PERSON_ID": "기안자 ID"
  "WRITE_PERSON_EMAIL": "기안자 이메일"
  "WRITE_PERSON_NAME": "기안자명"
  "WRITE_PERSON_DEPT": "기안자 부서"
  "APPROVAL_PERSON_ID": "결재자 ID"
  "APPROVAL_PERSON_EMAIL": "결재자 이메일"
  "APPROVAL_PERSON_NAME": "결재자명"
  "APPROVAL_PERSON_DPET_NAME": "결재자 부서"

# 6. 엑셀 스타일 설정
excel_styles:
  header_fill_color: "E0E0E0"
  history_fill_color: "CCFFFF"
